name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check ENV_FILE_CONTENT
        run: |
          if [ -z "${{ secrets.ENV_FILE_CONTENT }}" ]; then
            echo "❌ ENV_FILE_CONTENT is empty or not set"
            exit 1
          else
            echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
            echo "✅ .env file created successfully"
            echo "Lines in .env: $(wc -l < .env)"
            echo "Variables found:"
            cut -d'=' -f1 .env
          fi
