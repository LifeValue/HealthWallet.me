name: Shorebird Patch (OTA Hotfix)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to patch"
        required: true
        type: choice
        options:
          - android
          - ios
          - both
        default: both

concurrency:
  group: shorebird-patch
  cancel-in-progress: false

jobs:
  patch-android:
    if: inputs.platform == 'android' || inputs.platform == 'both'
    name: Patch Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - run: ssh-keyscan -p 2822 git.techstackapps.com >> ~/.ssh/known_hosts

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - run: shorebird patch --platforms android --flutter-version=3.38.7
    env:
      SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

  patch-ios:
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    name: Patch iOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - run: |
          ssh-keyscan -p 2822 git.techstackapps.com >> ~/.ssh/known_hosts
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - run: shorebird patch --platforms ios --flutter-version=3.38.7
    env:
      SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
