name: Shorebird Patch (OTA Hotfix)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to patch"
        required: true
        type: choice
        options:
          - android
          - ios
          - both
        default: both

concurrency:
  group: shorebird-patch
  cancel-in-progress: false

jobs:
  patch-android:
    if: inputs.platform == 'android' || inputs.platform == 'both'
    name: Patch Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - run: ssh-keyscan -p 2822 git.techstackapps.com >> ~/.ssh/known_hosts

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.7"
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Restore Apple Wallet certificates
        run: |
          mkdir -p assets/certs
          echo "${{ secrets.APPLE_PASS_CERTIFICATE_BASE64 }}" | base64 --decode > assets/certs/pass_certificate.pem
          echo "${{ secrets.APPLE_PASS_PRIVATE_KEY_BASE64 }}" | base64 --decode > assets/certs/private_key.pem

      - name: Restore Google Wallet service account
        run: |
          mkdir -p assets/certs/android
          echo "${{ secrets.GOOGLE_WALLET_SERVICE_ACCOUNT_BASE64 }}" | base64 --decode > assets/certs/android/service-account.json

      - uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Patch Android
        run: shorebird patch --platforms android --release-version=latest
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

  patch-ios:
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    name: Patch iOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - run: |
          ssh-keyscan -p 2822 git.techstackapps.com >> ~/.ssh/known_hosts
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.7"
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Restore Apple Wallet certificates
        run: |
          mkdir -p assets/certs
          echo "${{ secrets.APPLE_PASS_CERTIFICATE_BASE64 }}" | base64 --decode > assets/certs/pass_certificate.pem
          echo "${{ secrets.APPLE_PASS_PRIVATE_KEY_BASE64 }}" | base64 --decode > assets/certs/private_key.pem

      - uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Patch iOS
        run: shorebird patch --platforms ios --release-version=latest --no-codesign
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
