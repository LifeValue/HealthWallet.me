name: iOS Deploy

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane"
        required: true
        type: choice
        options:
          - beta
          - release

concurrency:
  group: ios-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to TestFlight (${{ inputs.lane }})
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH for private dependency
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add private dependency host to known_hosts
        run: ssh-keyscan -p 2822 git.techstackapps.com >> ~/.ssh/known_hosts

      - name: Restore local secrets
        run: |
          cp ~/.ci-secrets/root.env .env
          cp ~/.ci-secrets/ios/fastlane.env ios/fastlane/.env
          cp -r ~/.ci-secrets/ios/private_keys ios/fastlane/private_keys

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Run code generation
        run: fvm dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Install Fastlane dependencies
        run: cd ios && bundle install

      - name: Configure Match git credentials
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.MATCH_GIT_PAT }}@github.com" > ~/.git-credentials

      - name: Deploy to TestFlight
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          cd ios
          bundle exec fastlane ${{ inputs.lane }}

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f ~/.git-credentials
          rm -f .env
          rm -f ios/fastlane/.env
          rm -rf ios/fastlane/private_keys
